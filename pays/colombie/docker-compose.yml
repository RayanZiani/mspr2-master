version: "3.9"

services:
  mosquitto-colombie:
    image: eclipse-mosquitto:2
    container_name: mosquitto-colombie
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1885:1883"
    networks:
      - colombie-net

  mysql-colombie:
    image: mysql:8.0
    container_name: mysql-colombie
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-colombie-data:/var/lib/mysql
    networks:
      - colombie-net

  api-colombie:
    build: ./api
    container_name: api-colombie
    env_file: .env
    ports:
      - "8003:8000"
    depends_on:
      - mysql-colombie
      - mosquitto-colombie
    networks:
      - colombie-net

  node-red-colombie:
    image: nodered/node-red:latest
    container_name: node-red-colombie
    volumes:
      - ./node-red/flows.json:/data/flows.json
    ports:
      - "1882:1880"
    depends_on:
      - mosquitto-colombie
    networks:
      - colombie-net

volumes:
  mysql-colombie-data:

networks:
  colombie-net:
    driver: bridge
